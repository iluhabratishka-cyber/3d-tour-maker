            <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const viewerSection = document.getElementById('viewerSection');
        const photoContainer = document.getElementById('photoContainer');
        const thumbnails = document.getElementById('thumbnails');
        const progress = document.getElementById('progress');

        let photos = [];
        let currentPhotoIndex = 0;

        // Обработка перетаскивания
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // Обработка выбора файлов
        dropZone.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // Обработка файлов
        function handleFiles(files) {
            if (files.length === 0) return;

            progress.style.display = 'block';
            progress.textContent = `Загружено 0 из ${files.length} фото`;

            Array.from(files).forEach((file, index) => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        photos.push({
                            src: e.target.result,
                            name: file.name
                        });

                        progress.textContent = `Загружено ${photos.length} из ${files.length} фото`;

                        // Если все фото загружены, показываем просмотр
                        if (photos.length === files.length) {
                            setTimeout(() => {
                                showViewer();
                            }, 500);
                        }
                    };
                    reader.readAsDataURL(file);
                }
            });
        }

        // Показываем просмотр
        function showViewer() {
            progress.style.display = 'none';
            viewerSection.style.display = 'block';
            photoContainer.innerHTML = '';
            thumbnails.innerHTML = '';

            // Создаем фото и миниатюры
            photos.forEach((photo, index) => {
                // Основное фото
                const img = document.createElement('img');
                img.src = photo.src;
                img.alt = `Фото ${index + 1}`;
                img.classList.add(index === 0 ? 'active' : '');
                photoContainer.appendChild(img);

                // Миниатюра
                const thumb = document.createElement('img');
                thumb.src = photo.src;
                thumb.alt = `Фото ${index + 1}`;
                thumb.classList.add('thumbnail', index === 0 ? 'active' : '');
                thumb.onclick = () => showPhoto(index);
                thumbnails.appendChild(thumb);
            });

            currentPhotoIndex = 0;
        }

        // Показываем конкретное фото
        function showPhoto(index) {
            // Скрываем все фото
            photoContainer.querySelectorAll('img').forEach(img => {
                img.classList.remove('active');
            });

            // Показываем выбранное
            photoContainer.querySelectorAll('img')[index].classList.add('active');

            // Обновляем миниатюры
            thumbnails.querySelectorAll('.thumbnail').forEach((thumb, i) => {
                thumb.classList.toggle('active', i === index);
            });

            currentPhotoIndex = index;
        }

        // Навигация
        function nextPhoto() {
            const nextIndex = (currentPhotoIndex + 1) % photos.length;
            showPhoto(nextIndex);
        }

        function previousPhoto() {
            const prevIndex = (currentPhotoIndex - 1 + photos.length) % photos.length;
            showPhoto(prevIndex);
        }

        function resetView() {
            currentPhotoIndex = 0;
            showPhoto(0);
        }

        // Возврат к загрузке
        function backToUpload() {
            viewerSection.style.display = 'none';
            dropZone.style.display = 'block';
            photos = [];
            fileInput.value = '';
        }

        // Поделиться туром
        function shareTour() {
            const tourUrl = window.location.href + '?tour=' + encodeURIComponent(JSON.stringify(photos));
            navigator.clipboard.writeText(tourUrl).then(() => {
                alert('Ссылка на тур скопирована в буфер обмена!');
            }).catch(() => {
                prompt('Скопируйте эту ссылку:', tourUrl);
            });
        }

        // Клавиатурная навигация
        document.addEventListener('keydown', (e) => {
            if (viewerSection.style.display === 'block') {
                switch(e.key) {
                    case 'ArrowLeft':
                        previousPhoto();
                        break;
                    case 'ArrowRight':
                        nextPhoto();
                        break;
                    case 'Escape':
                        backToUpload();
                        break;
                }
            }
        });

        console.log('3D Фото Тур загружен! 🚀');
    </script>
