<!DOCTYPE html>
<html>
<head>
    <title>3D Фото Тур</title>
    <style>
        body { padding: 20px; background: #f5f5f5; }
        .container { background: white; padding: 30px; border-radius: 10px; max-width: 600px; margin: 0 auto; }
        #dropZone {
            border: 3px solid #ddd;
            padding: 60px;
            text-align: center;
            margin: 20px 0;
            cursor: pointer;
            background: #fafafa;
        }
        #dropZone:hover { background: #f0f0f0; }
        #viewer { display: none; margin-top: 20px; }
        #viewer img { max-width: 100%; border-radius: 8px; }
        .btn { background: #4CAF50; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📸 Загрузите фото</h1>
        <div id="dropZone" onclick="document.getElementById('fileInput').click()">
            <p>Кликните сюда для выбора фото</p>
            <input type="file" id="fileInput" style="display: none;" accept="image/*">
        </div>

        <div id="viewer">
            <h3>Ваше фото:</h3>
            <img id="photo" src="">
            <button class="btn" onclick="resetView()">🔄 Еще фото</button>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const viewer = document.getElementById('viewer');
        const photo = document.getElementById('photo');

        fileInput.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    photo.src = e.target.result;
                    viewer.style.display = 'block';
                    dropZone.style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        };

        function resetView() {
            viewer.style.display = 'none';
            dropZone.style.display = 'block';
            fileInput.value = '';
        }
    </script>
</body>
</html>
