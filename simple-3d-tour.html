<!DOCTYPE html>
<html>
<head>
    <title>Простой 3D тур</title>
    <style>
        body { margin: 0; padding: 20px; background: #f0f0f0; font-family: Arial; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
        .upload {
            border: 3px solid #4CAF50;
            padding: 50px;
            text-align: center;
            cursor: pointer;
            border-radius: 10px;
            margin: 20px 0;
            background: #f9f9f9;
        }
        .upload:hover { background: #f0f0f0; }
        .upload.dragover { background: #e8f5e9; }

        #fileInput { display: none; }

        #viewer {
            position: relative;
            width: 100%;
            height: 400px;
            background: #ddd;
            margin: 20px 0;
            border-radius: 8px;
            overflow: hidden;
        }

        .viewer img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            display: none;
        }

        .viewer img.active {
            display: block;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .controls {
            text-align: center;
            margin: 20px 0;
        }

        .controls button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            margin: 5px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: all 0.3s;
        }

        .controls button:hover {
            background: #45a049;
            transform: translateY(-2px);
        }

        .info {
            text-align: center;
            color: #666;
            margin: 10px 0;
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏠 Простой 3D тур</h1>

        <!-- Экран загрузки -->
        <div id="uploadScreen">
            <div class="upload" id="uploadArea">
                <p style="font-size: 24px; margin: 0 0 10px 0;">📸</p>
                <p style="font-size: 18px; margin: 0 0 10px 0;">Перетащите фото сюда</p>
                <p style="font-size: 14px; color: #666;">или кликните для выбора</p>
                <input type="file" id="fileInput" style="display: none;" accept="image/*" multiple>
            </div>
            <div class="info">
                <p>💡 Подсказка: можно загрузить несколько фото сразу</p>
            </div>
        </div>

        <!-- Экран просмотра -->
        <div id="viewerScreen" class="hidden">
            <div class="info">
                <p>📸 Найдено <span id="photoCount">0</span> фото</p>
                <p>Используйте кнопки или стрелки клавиатуры для навигации</p>
            </div>

            <div class="controls">
                <button onclick="previous()">⬅️ Назад</button>
                <button onclick="reset()">🔄 В начало</button>
                <button onclick="next()">Вперед ➡️</button>
            </div>

            <div id="viewer">
                <!-- Фото будут добавляться сюда -->
            </div>

            <div class="controls">
                <button onclick="backToUpload()">📤 Загрузить еще фото</button>
            </div>
        </div>
    </div>

    <script>
        // Переменные
        const uploadScreen = document.getElementById('uploadScreen');
        const viewerScreen = document.getElementById('viewerScreen');
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const viewer = document.getElementById('viewer');
        const photoCount = document.getElementById('photoCount');

        let photos = [];
        let currentPhotoIndex = 0;

        // Обработка клика на область загрузки
        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        // Drag and Drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        // Оббортка выбора файлов
        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        // Основная функция загрузки
        function handleFiles(files) {
            if (files.length === 0) return;

            // Очищаем предыдущие фото
            viewer.innerHTML = '';
            photos = [];

            // Загружаем каждое фото
            Array.from(files).forEach((file, index) => {
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();

                    reader.onload = function(e) {
                        // Создаем элемент img
                        const img = document.createElement('img');
                        img.src = e.target.result;
                        img.alt = `Фото ${index + 1}`;

                        // Добавляем в viewer
                        viewer.appendChild(img);
                        photos.push(img);

                        // Если первое фото, показываем его
                        if (photos.length === 1) {
                            photos[0].classList.add('active');
                            showViewer();
                        }

                        // Обновляем счетчик
                        photoCount.textContent = photos.length;
                    };

                    reader.readAsDataURL(file);
                }
            });
        }

        // Показываем экран просмотра
        function showViewer() {
            uploadScreen.classList.add('hidden');
            viewerScreen.classList.remove('hidden');
        }

        // Возвращаемся к загрузке
        function backToUpload() {
            viewerScreen.classList.add('hidden');
            uploadScreen.classList.remove('hidden');
        }

        // Навигация
        function next() {
            if (photos.length <= 1) return;

            // Скрываем текущее фото
            photos[currentPhotoIndex].classList.remove('active');

            // Переходим к следующему
            currentPhotoIndex = (currentPhotoIndex + 1) % photos.length;

            // Показываем новое
            photos[currentPhotoIndex].classList.add('active');
        }

        function previous() {
            if (photos.length <= 1) return;

            // Скрываем текущее фото
            photos[currentPhotoIndex].classList.remove('active');

            // Переходим к предыдущему
            currentPhotoIndex = currentPhotoIndex === 0 ? photos.length - 1 : currentPhotoIndex - 1;

            // Показываем новое
            photos[currentPhotoIndex].classList.add('active');
        }

        function reset() {
            if (photos.length === 0) return;

            // Скрываем текущее
            photos[currentPhotoIndex].classList.remove('active');

            // Показываем первое
            currentPhotoIndex = 0;
            photos[currentPhotoIndex].classList.add('active');
        }

        // Клавиатурная навигация
        document.addEventListener('keydown', (e) => {
            if (viewerScreen.classList.contains('hidden')) return;

            switch(e.key) {
                case 'ArrowLeft':
                    previous();
                    break;
                case 'ArrowRight':
                    next();
                    break;
                case 'Escape':
                    backToUpload();
                    break;
            }
        });
    </script>
</body>
</html>
